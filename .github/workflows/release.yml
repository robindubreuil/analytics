name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      - run: go test -v -race -cover ./...
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - working-directory: dashboard
        run: npm ci && npm test

  build-deb:
    name: Build Debian Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: go mod download
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev debhelper devscripts brotli build-essential
      - name: Set changelog version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/(1.0.0-1)/($VERSION-1)/" debian/changelog
      - name: Build dashboard
        working-directory: dashboard
        run: npm ci && npm run build
      - name: Build .deb package
        run: dpkg-buildpackage -us -uc -b -d
      - name: Collect package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp ../analytics_*.deb ./analytics_${VERSION}_amd64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: ../analytics_*_amd64.deb

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-deb]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: debian-package
          path: ./release-assets
      - name: Generate release notes
        id: notes
        run: |
          VERSION=${GITHUB_REF_NAME}
          {
            echo "body<<EOF"
            echo "## Analytics ${VERSION}"
            echo ""
            echo "### Install (Debian/Ubuntu)"
            echo "\`\`\`bash"
            echo "wget https://github.com/robindubreuil/analytics/releases/download/${VERSION}/analytics_${VERSION#v}_amd64.deb"
            echo "sudo dpkg -i analytics_${VERSION#v}_amd64.deb"
            echo "sudo systemctl status analytics"
            echo "\`\`\`"
            echo ""
            echo "Static assets are installed to \`/usr/share/analytics/\`."
            echo "Point Caddy/nginx to serve the dashboard from there and reverse-proxy \`/api/*\` to the service on \`:3001\`."
            echo ""
            echo "### What's Changed"
            echo ""
            git log --pretty=format:"- %s (%h)" $(git tag --sort=-version:refname | head -2 | tail -1)..HEAD 2>/dev/null || echo "- Initial release"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Analytics ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: ./release-assets/*

  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.repository == 'robindubreuil/analytics'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/robindubreuil/analytics
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
